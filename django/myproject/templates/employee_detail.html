{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

</head>
<body>
<div class="container mt-3">
  <div class="card" style="width:250px">
    <img class="card-img-top" src="{{employee.photo.url}}" alt="Employee Photo" style="width:250px;height: 220px;border-radius: 50%;">
    <div class="card-body">
      <h4 class="card-text">{{employee.firstname}} {{employee.lastname}}</h4>
      <p class="card-text">{{employee.designation}} </p>
      <p class="card-text">{{employee.email_address}} </p>
      <p class="card-text">{{employee.phone_number}} </p>
      
    </div>
    <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
  </div>
  
</body>
</html>
