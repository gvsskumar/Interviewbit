<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Register</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Employee Registration </h3>
                    </div>

                    <div class="card-body">

                        <form action="{% url 'create_employee' %}" method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">Employee Name</label>
                                <input type="text" name="name" class="form-control" placeholder="Enter name">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">EMP ID</label>
                                <input type="text" name="emp_id" class="form-control" placeholder="Enter EMP ID">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dept Name</label>
                                <input type="text" name="dept_name" class="form-control" placeholder="Enter Dept Name">
                            </div>


                            <div class="mb-3">
                                <label class="form-label">Salary</label>
                                <input type="number" name="salary" class="form-control" placeholder="Enter salary">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    Register Employee
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
